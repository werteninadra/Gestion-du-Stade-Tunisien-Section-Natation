<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00bcd4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#006064;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" fill="url(#grad1)"/>
  
  <!-- Water waves -->
  <path d="M30 100 Q50 80, 70 100 T110 100 T150 100 T190 100" stroke="white" stroke-width="4" fill="none" opacity="0.6"/>
  <path d="M30 120 Q50 100, 70 120 T110 120 T150 120 T190 120" stroke="white" stroke-width="3" fill="none" opacity="0.4"/>
  <path d="M30 140 Q50 120, 70 140 T110 140 T150 140 T190 140" stroke="white" stroke-width="2" fill="none" opacity="0.3"/>
  
  <!-- Swimming figure -->
  <ellipse cx="100" cy="90" rx="15" ry="8" fill="white" opacity="0.9"/>
  <circle cx="115" cy="88" r="5" fill="white"/>
  
  <!-- Text -->
  <text x="100" y="170" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="16" font-weight="bold">AQUA STADE</text>
</svg>
