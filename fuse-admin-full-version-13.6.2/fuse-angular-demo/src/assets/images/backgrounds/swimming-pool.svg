<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <defs>
    <linearGradient id="water" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#00bcd4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#006064;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Sky -->
  <rect width="1920" height="1080" fill="#e0f7fa"/>
  
  <!-- Pool water -->
  <rect x="0" y="400" width="1920" height="680" fill="url(#water)"/>
  
  <!-- Pool lanes -->
  <line x1="0" y1="500" x2="1920" y2="500" stroke="white" stroke-width="2" opacity="0.5"/>
  <line x1="0" y1="600" x2="1920" y2="600" stroke="white" stroke-width="2" opacity="0.5"/>
  <line x1="0" y1="700" x2="1920" y2="700" stroke="white" stroke-width="2" opacity="0.5"/>
  <line x1="0" y1="800" x2="1920" y2="800" stroke="white" stroke-width="2" opacity="0.5"/>
  <line x1="0" y1="900" x2="1920" y2="900" stroke="white" stroke-width="2" opacity="0.5"/>
  
  <!-- Pool edge -->
  <rect x="0" y="380" width="1920" height="20" fill="#004d40"/>
  <rect x="0" y="1060" width="1920" height="20" fill="#004d40"/>
</svg>
